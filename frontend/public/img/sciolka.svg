<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#87ceeb"/><stop offset="100%" stop-color="#b8e6b8"/></linearGradient></defs>
<rect width="800" height="600" fill="url(#sky)"/>
<rect y="200" width="800" height="400" fill="#7d4f2a"/>
<!-- pnie drzew -->
<rect x="60" y="0" width="40" height="600" fill="#8b5a3c"/>
<rect x="700" y="0" width="40" height="600" fill="#8b5a3c"/>
<rect x="350" y="0" width="50" height="600" fill="#8b5a3c"/>
<!-- igliwie i liscie na sciolce -->
<g>
  <ellipse cx="150" cy="350" rx="20" ry="8" fill="#e74c3c" transform="rotate(30 150 350)"/>
  <ellipse cx="250" cy="380" rx="20" ry="8" fill="#ffd93d" transform="rotate(-20 250 380)"/>
  <ellipse cx="180" cy="430" rx="22" ry="9" fill="#e67e22" transform="rotate(60 180 430)"/>
  <ellipse cx="500" cy="350" rx="20" ry="8" fill="#ffd93d" transform="rotate(45 500 350)"/>
  <ellipse cx="600" cy="400" rx="22" ry="9" fill="#e74c3c" transform="rotate(-30 600 400)"/>
  <ellipse cx="450" cy="450" rx="20" ry="8" fill="#f39c12" transform="rotate(15 450 450)"/>
  <ellipse cx="290" cy="470" rx="22" ry="9" fill="#e67e22" transform="rotate(-50 290 470)"/>
  <ellipse cx="550" cy="500" rx="20" ry="8" fill="#ffd93d" transform="rotate(40 550 500)"/>
  <!-- igły -->
  <line x1="100" y1="380" x2="120" y2="385" stroke="#4d8c2f" stroke-width="3"/>
  <line x1="350" y1="420" x2="370" y2="425" stroke="#4d8c2f" stroke-width="3"/>
  <line x1="630" y1="450" x2="650" y2="455" stroke="#4d8c2f" stroke-width="3"/>
  <!-- patyk -->
  <line x1="200" y1="500" x2="320" y2="520" stroke="#5a3a26" stroke-width="6"/>
  <!-- mech kępka -->
  <ellipse cx="500" cy="540" rx="40" ry="12" fill="#6ab04c"/>
</g>
<text x="400" y="170" text-anchor="middle" font-family="Comic Sans MS" font-size="32" font-weight="bold" fill="#5a3a26">ściółka leśna</text>
</svg>