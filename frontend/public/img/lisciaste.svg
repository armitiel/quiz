<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#87ceeb"/><stop offset="100%" stop-color="#b8e6b8"/></linearGradient></defs>
<rect width="800" height="600" fill="url(#sky)"/>
<rect y="430" width="800" height="170" fill="#7d4f2a"/>
<g transform="translate(150,430)">
