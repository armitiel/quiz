<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#87ceeb"/><stop offset="100%" stop-color="#b8e6b8"/></linearGradient></defs><rect width="800" height="600" fill="url(#sky)"/><rect y="350" width="800" height="250" fill="#6ab04c"/><path d="M0,350 Q200,330 400,350 T800,350 L800,400 L0,400 Z" fill="#4d8c2f"/>
<g transform="translate(400,400) rotate(-5)">
  <!-- mapa -->
  <rect x="-180" y="-120" width="360" height="240" fill="#ffe066" stroke="#8b5a3c" stroke-width="4"/>
  <!-- linie/szlaki -->
  <path d="M-170,-100 Q-50,-50 50,0 T170,80" stroke="#e74c3c" stroke-width="3" fill="none" stroke-dasharray="6,4"/>
  <path d="M-150,80 Q0,30 150,-80" stroke="#4d8c2f" stroke-width="3" fill="none"/>
  <!-- góry -->
  <polygon points="-100,-50 -70,-90 -40,-50" fill="#3d2814"/>
  <polygon points="-110,-30 -85,-60 -60,-30" fill="#6b4423"/>
  <!-- drzewa na mapie -->
  <circle cx="60" cy="-50" r="15" fill="#4d8c2f"/>
  <circle cx="100" cy="-30" r="15" fill="#4d8c2f"/>
  <circle cx="-30" cy="60" r="15" fill="#4d8c2f"/>
  <!-- jezioro -->
  <ellipse cx="100" cy="60" rx="40" ry="15" fill="#3498db"/>
</g>
<!-- kompas -->
<g transform="translate(180,200)">
  <circle cx="0" cy="0" r="60" fill="#ffffff" stroke="#5a3a26" stroke-width="4"/>
  <circle cx="0" cy="0" r="50" fill="#ffe066"/>
  <text x="0" y="-30" text-anchor="middle" font-family="Comic Sans MS" font-size="16" font-weight="bold" fill="#e74c3c">N</text>
  <text x="0" y="42" text-anchor="middle" font-family="Comic Sans MS" font-size="16" font-weight="bold" fill="#5a3a26">S</text>
  <text x="-35" y="6" text-anchor="middle" font-family="Comic Sans MS" font-size="16" font-weight="bold" fill="#5a3a26">W</text>
  <text x="35" y="6" text-anchor="middle" font-family="Comic Sans MS" font-size="16" font-weight="bold" fill="#5a3a26">E</text>
  <polygon points="0,-25 -8,5 0,0 8,5" fill="#e74c3c"/>
  <polygon points="0,25 -8,-5 0,0 8,-5" fill="#ffffff" stroke="#5a3a26" stroke-width="2"/>
  <circle cx="0" cy="0" r="4" fill="#5a3a26"/>
</g>
<text x="400" y="565" text-anchor="middle" font-family="Comic Sans MS" font-size="24" font-weight="bold" fill="#5a3a26">mapa i kompas</text>
</svg>